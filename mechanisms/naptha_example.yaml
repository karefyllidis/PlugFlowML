# mechanisms/naptha_example.yaml
#
# EDUCATIONAL EXAMPLE MECHANISM -- for course use only.
#
# This is NOT a proprietary or industrial-grade mechanism. It is a reduced,
# openly-licensed n-hexane pyrolysis mechanism assembled for this course so
# every lesson (including the ones that run a real Cantera simulation) can
# be executed by anyone, without needing a confidential mechanism file.
#
# Provenance:
#   1. Base mechanism: n-hexane oxidation mechanism from K. Zhang, C. Banyon,
#      C. Togbe, P. Dagaut, J. Bugler, H. J. Curran (2015), "An experimental
#      and kinetic modeling study of n-hexane oxidation", Combustion and
#      Flame 162:11, 4194-4207. https://doi.org/10.1016/j.combustflame.2015.08.001
#      Distributed as example_data/n-hexane-NUIG-2015.yaml, bundled with every
#      Cantera install (Cantera's own cantera-example-data/README.md: neither
#      Cantera nor the original authors grant an explicit license, but the
#      mechanism "appears to be shared without restrictive licensing
#      requirements" and is used in Cantera's own public documentation).
#   2. Reduced from 1268 species / 5336 reactions to 113 species / 300
#      reactions, using Cantera's own documented reduction technique (rank
#      reactions by maximum relative net rate-of-progress across
#      representative pyrolysis conditions spanning this course's operating
#      envelope: T=800-900K, P=1.5-3.5bar, hexane:water feed, no O2 --
#      i.e. thermal cracking, not combustion). Validated against the full
#      1268-species mechanism at the same conditions: conversion and the
#      relative ordering/magnitude of major products (ethylene, propylene,
#      methane, butenes, butadiene) match closely; a further, less-reduced
#      candidate (167 species / 600 reactions) gave near-identical results,
#      confirming convergence.
#   3. Species renamed (7 of 113) to match this course's existing species-
#      classification convention (see docs/SPECIES_LUMPING_MODEL_CARD.md and
#      notebooks/Main_3): NC6H14->C6H14(nuig), C4H8-1->C4H8(nuig),
#      C6H6->Benzene(nuig), H2O->Water(nuig), AR->Ar(nuig), C2H6->CC(nuig),
#      C3H8->CCC(nuig). Content/chemistry is unchanged; only species labels
#      were adapted.
#
# If you use this mechanism in scientific work, cite the Zhang et al. (2015)
# paper above -- this reduced/relabeled version is for teaching, not research.
#
