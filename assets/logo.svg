<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <!-- Background gradient: very dark charcoal, nearly flat -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0e1117"/>
      <stop offset="100%" stop-color="#13181f"/>
    </linearGradient>

    <!-- Accent blue gradient for the reactor tube -->
    <linearGradient id="tubeStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Subtle fill for reactor interior -->
    <linearGradient id="tubeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f1e33" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Orange-amber gradient for heat marks -->
    <linearGradient id="heat" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Glow filter for nodes and key elements -->
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft drop shadow for the card -->
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip to rounded rect -->
    <clipPath id="cardClip">
      <rect width="480" height="120" rx="10"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="480" height="120" rx="10" fill="url(#bg)" filter="url(#cardShadow)"/>

  <!-- Thin top accent line -->
  <rect x="0" y="0" width="480" height="2" rx="1" fill="url(#tubeStroke)" clip-path="url(#cardClip)"/>

  <!-- ══════════════════════════════════════════════
       LEFT ICON BLOCK  (x: 18 – 160)
       PFR reactor + connecting arrow + NN diagram
       ══════════════════════════════════════════════ -->

  <!-- === REACTOR TUBE === -->
  <!-- Tube body -->
  <rect x="18" y="44" width="76" height="32" rx="4"
        fill="url(#tubeFill)" stroke="url(#tubeStroke)" stroke-width="1.8"/>
  <!-- Left inlet flange -->
  <rect x="14" y="40" width="7" height="40" rx="2"
        fill="url(#tubeStroke)" opacity="0.9"/>
  <!-- Right outlet nozzle -->
  <rect x="94" y="52" width="12" height="16" rx="2"
        fill="url(#tubeStroke)" opacity="0.8"/>

  <!-- Flow dashes inside tube -->
  <line x1="28" y1="60" x2="86" y2="60"
        stroke="#60a5fa" stroke-width="1.4" stroke-dasharray="5 3.5" opacity="0.55"/>
  <!-- Arrow head -->
  <polygon points="85,55.5 94,60 85,64.5" fill="#60a5fa" opacity="0.7"/>

  <!-- Heat flux marks — top row -->
  <path d="M32,43 Q34.5,36 37,43 Q39.5,36 42,43"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M48,43 Q50.5,36 53,43 Q55.5,36 58,43"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M64,43 Q66.5,36 69,43 Q71.5,36 74,43"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Heat flux marks — bottom row -->
  <path d="M32,77 Q34.5,84 37,77 Q39.5,84 42,77"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M48,77 Q50.5,84 53,77 Q55.5,84 58,77"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M64,77 Q66.5,84 69,77 Q71.5,84 74,77"
        stroke="url(#heat)" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Connector from reactor to NN -->
  <line x1="106" y1="60" x2="122" y2="60"
        stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <polygon points="120,56.5 126,60 120,63.5" fill="#3b82f6" opacity="0.5"/>

  <!-- === NEURAL NETWORK === -->
  <!-- Edge lines (drawn first so nodes sit on top) -->
  <!-- Input → Hidden -->
  <g stroke="#1e3a5f" stroke-width="0.9" opacity="0.9">
    <line x1="131" y1="42" x2="151" y2="34"/>
    <line x1="131" y1="42" x2="151" y2="50"/>
    <line x1="131" y1="42" x2="151" y2="66"/>
    <line x1="131" y1="42" x2="151" y2="82"/>
    <line x1="131" y1="60" x2="151" y2="34"/>
    <line x1="131" y1="60" x2="151" y2="50"/>
    <line x1="131" y1="60" x2="151" y2="66"/>
    <line x1="131" y1="60" x2="151" y2="82"/>
    <line x1="131" y1="78" x2="151" y2="34"/>
    <line x1="131" y1="78" x2="151" y2="50"/>
    <line x1="131" y1="78" x2="151" y2="66"/>
    <line x1="131" y1="78" x2="151" y2="82"/>
  </g>
  <!-- Hidden → Output -->
  <g stroke="#1e3a5f" stroke-width="0.9" opacity="0.9">
    <line x1="157" y1="34" x2="177" y2="42"/>
    <line x1="157" y1="34" x2="177" y2="60"/>
    <line x1="157" y1="34" x2="177" y2="78"/>
    <line x1="157" y1="50" x2="177" y2="42"/>
    <line x1="157" y1="50" x2="177" y2="60"/>
    <line x1="157" y1="50" x2="177" y2="78"/>
    <line x1="157" y1="66" x2="177" y2="42"/>
    <line x1="157" y1="66" x2="177" y2="60"/>
    <line x1="157" y1="66" x2="177" y2="78"/>
    <line x1="157" y1="82" x2="177" y2="42"/>
    <line x1="157" y1="82" x2="177" y2="60"/>
    <line x1="157" y1="82" x2="177" y2="78"/>
  </g>

  <!-- Input layer (blue) -->
  <circle cx="131" cy="42" r="5.5" fill="#1d4ed8" filter="url(#nodeGlow)"/>
  <circle cx="131" cy="60" r="5.5" fill="#1d4ed8" filter="url(#nodeGlow)"/>
  <circle cx="131" cy="78" r="5.5" fill="#1d4ed8" filter="url(#nodeGlow)"/>
  <!-- Hidden layer (teal/green) -->
  <circle cx="154" cy="34" r="5.5" fill="#059669" filter="url(#nodeGlow)"/>
  <circle cx="154" cy="50" r="5.5" fill="#059669" filter="url(#nodeGlow)"/>
  <circle cx="154" cy="66" r="5.5" fill="#059669" filter="url(#nodeGlow)"/>
  <circle cx="154" cy="82" r="5.5" fill="#059669" filter="url(#nodeGlow)"/>
  <!-- Output layer (bright blue) -->
  <circle cx="177" cy="42" r="5.5" fill="#2563eb" filter="url(#nodeGlow)"/>
  <circle cx="177" cy="60" r="5.5" fill="#2563eb" filter="url(#nodeGlow)"/>
  <circle cx="177" cy="78" r="5.5" fill="#2563eb" filter="url(#nodeGlow)"/>

  <!-- Thin vertical separator -->
  <line x1="205" y1="20" x2="205" y2="100" stroke="#1f2937" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════
       RIGHT TEXT BLOCK  (x: 218+)
       ══════════════════════════════════════════════ -->

  <!-- "open_" superscript-style label -->
  <text x="220" y="46"
        font-family="'SF Mono','Fira Code','Consolas',monospace"
        font-size="12" letter-spacing="1.5"
        fill="#4b5563" font-weight="400">open_</text>

  <!-- "HydrAI" main wordmark -->
  <text x="218" y="80"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" letter-spacing="-1"
        fill="#f9fafb">Hydr</text>
  <text x="338" y="80"
        font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" letter-spacing="-1"
        fill="#3b82f6">AI</text>

  <!-- Tagline -->
  <text x="220" y="98"
        font-family="'Inter','Segoe UI',Arial,sans-serif"
        font-size="9.5" letter-spacing="0.8" fill="#6b7280"
        font-weight="400">ML SURROGATE  ·  STEAM CRACKING  ·  PFR</text>
</svg>
